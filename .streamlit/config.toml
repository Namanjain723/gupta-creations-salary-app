# Streamlit theme — light, Zoho/Google-like (matches the app's design system).
[theme]
base = "light"
primaryColor = "#1A73E8"
backgroundColor = "#F8F9FA"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#202124"
font = "sans serif"

[server]
headless = true
maxUploadSize = 50

[browser]
gatherUsageStats = false
